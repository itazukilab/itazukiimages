name: Unzip NFT Images

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  unzip-files:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create Images Directory
        run: mkdir -p images

      - name: Unzip All Parts
        run: |
          for file in part*.zip; do
            if [ -f "$file" ]; then
              echo "Unzipping $file..."
              unzip -o "$file" -d images/
            fi
          done

      - name: Clean Up Zip Files
        run: rm -f part*.zip

      - name: Commit and Push Unzipped Images
        run: |
          git config --global user.name "itazukilab"
          git config --global user.email "itazukilab@users.noreply.github.com"
          git add images/
          git commit -m "Automated unzip: Extract all NFT images" || exit 0
          git push origin main
