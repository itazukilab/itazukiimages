name: Unzip NFT Images Directly

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  unzip-files:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create Images Directory
        run: mkdir -p images

      - name: Unzip All Parts Directly Into Images Folder
        run: |
          for file in part*.zip; do
            if [ -f "$file" ]; then
              echo "Extracting $file directly into images/..."
              # -j flag junk paths (does not create subfolders from zip structure)
              unzip -o -j "$file" -d images/
            fi
          done

      - name: Clean Up Zip Files
        run: rm -f part*.zip

      - name: Commit and Push Unzipped Images
        run: |
          git config --global user.name "itazukilab"
          git config --global user.email "itazukilab@users.noreply.github.com"
          git add images/
          git commit -m "Fix: Extract all NFT images directly to images folder" || exit 0
          git push origin main
